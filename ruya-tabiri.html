<script src="data.js"></script>
<script src="script.js"></script>
<script>
  const dreamSearch = document.getElementById("dreamSearch");
  const dreamResults = document.getElementById("dreamResults");
  const allKeys = Object.keys(DREAM_DICTIONARY);

  function renderResults(query) {
    dreamResults.innerHTML = "";
    const q = query.trim().toLocaleLowerCase("tr-TR");

    if (!q) {
      dreamResults.innerHTML = '<div class="empty-state">Aramaya başlamak için yukarıya bir kelime yaz.</div>';
      return;
    }

    const matches = allKeys.filter((key) => key.includes(q));

    if (matches.length === 0) {
      dreamResults.innerHTML = '<div class="empty-state">"' + query + '" için bir sonuç bulunamadı. Başka bir kelime dene.</div>';
      return;
    }

    matches.forEach((key) => {
      const item = document.createElement("div");
      item.className = "dream-item";
      item.innerHTML = "<h4>" + key + "</h4><p>" + DREAM_DICTIONARY[key] + "</p>";
      dreamResults.appendChild(item);
    });
  }

  dreamSearch.addEventListener("input", () => renderResults(dreamSearch.value));
  renderResults("");
</script>
